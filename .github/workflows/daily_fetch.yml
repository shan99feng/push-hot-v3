name: 每日论文采集

on:
  # 每天北京时间 07:00（UTC 23:00 前一天）自动运行，推送前一天的热点论文
  schedule:
    - cron: '0 23 * * *'
  # 支持手动触发（用于补跑历史数据）
  workflow_dispatch:
    inputs:
      date:
        description: '指定采集日期（留空则采集前一天），格式 YYYY-MM-DD'
        required: false
        default: ''

permissions:
  contents: write   # 需要写权限以提交数据文件
  actions: write    # 需要触发其他 workflow

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 配置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install certifi

      - name: 执行论文采集
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
        run: |
          python3 scripts/fetch_papers.py

      - name: 提交数据更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # 如果有变更才提交
          git diff --cached --quiet || git commit -m "📄 每日论文更新 $(date -u '+%Y-%m-%d')"
          git push

      - name: 触发页面部署
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy_pages.yml/dispatches \
            -d '{"ref":"main"}'
